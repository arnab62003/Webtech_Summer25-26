<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>SignUp</title>
    </head>
    <body>
        <fieldset>
        <legend>SignUp</legend>
        <div class="container">
        <h1 align="center"><font color ="red"> Bank Account Registration </font></h1>
        <form>
            <table>
            <tr>
            <td><label for = "name">Account. Holder Name : </label></td>
            <td><input type="text" id =name name =name></td>
            </tr>

            <tr>
            <td><label for ="phone">Account. Holder Phone : </label></td>
            <td><input type="text" id=phone name=phone></td>
            </tr>

            <tr>
            <td><label for ="email">Account. Holder Email : </label></td>
            <td><input type="text" id=email name=email></td>
            </tr>

            <tr>
            <td><label for="address">Address : </label></td>
            <td><textarea id=address cols="21" rows="10" style="resize: none">
            </textarea></td>
            </tr>

            <tr>
            <td><label for="gender">Account. Holder Gender : </label></td>
            <td><input type ="radio" id =Gender name= Gender value="Male">
            <label for="Male"> Male </label>
            <input type ="radio" id =Gender name= Gender value="Female">
            <label for="Female"> Female </label></td>
            </tr>
            
            </table>
        </form>
        </div>
        </fieldset>
    </body>
</html>
