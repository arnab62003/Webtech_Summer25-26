<!DOCTYPE>
<html lang="en-US">
    <head>
        <title>Account_Info</title>
        <link rel="stylesheet" href="../Design/Form2.css">

    </head>
    <fieldset>
        <legend align="center">Personal Account Info</legend>
        <div class="container">
            <table>
                <tr>
                    <td><label for="name">Username : </label></td>
                    <td><input type="text" id=name name=name></td>
                </tr>
                <tr>
                    <td><label for="pass">Password : </label></td>
                    <td><input type="password" id=pass name=pass></td>
                </tr>
                <tr>
                    <td><label for="confirm_pass">Confirm Password : </label></td>
                    <td><input type="password" id=confirm_pass name=confirm_pass></td>
                </tr>
            </table>
        </div>
    </fieldset>
</html>
